app:
  port: 3000

logging:
  levels:
    - debug
    - log
    - warn
    - error
    - fatal

database:
  host: '127.0.0.1'
  port: 5432
  username: postgres
  password: postgres
  database: weather_activity_planner
  synchronize: false
  logging: true

clients:
  openMeteo:
    baseUrl: https://api.open-meteo.com/v1
    forecastDays: 7
    timeoutMs: 5000
    retryCount: 3
    retryDelayMs: 1000

scheduler:
  enabled: true
  batchSize: 20